services:
  clavamea:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-clavamea:latest}
    container_name: clavamea
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./memory:/app/memory
    environment:
      - DATABASE_URL=sqlite:/app/data/clavamea.db
      - MEMORY_DIR=/app/memory
      - LOCALES_DIR=/app/locales
      # WhatsApp integration (integrated)
      - ENABLE_WHATSAPP=true
      - WHATSAPP_DB_PATH=/app/data/whatsapp.db
    ports:
      - "8081:8081"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup
