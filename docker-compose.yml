services:
  clavamea:
    image: ${DOCKER_IMAGE:-clavamea:latest}
    container_name: clavamea
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./memory:/app/memory
    environment:
      - DATABASE_URL=sqlite:/app/data/clavamea.db
      - MEMORY_DIR=/app/memory
      - LOCALES_DIR=/app/locales
